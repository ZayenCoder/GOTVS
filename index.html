<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO TVS - Live Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }
        #video {
            width: 100%;
            height: auto;
            background: #111;
        }
        .info {
            color: #fff;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }
        .error {
            color: #ff4444;
            text-align: center;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="video" controls autoplay playsinline></video>
        <div class="info">GO TVS - FIFA 2026 Live</div>
        <div class="error" id="error">⚠️ ভিডিও লোড করা যাচ্ছে না। স্ট্রিম বন্ধ থাকতে পারে।</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // ফেচ API দিয়ে প্রথমে akrfytv.online থেকে স্ট্রিম URL নিয়ে আসবো
        async function getStreamUrl() {
            try {
                const response = await fetch('https://akrfytv.online/api/stream/srv-football-1', {
                    method: 'GET',
                    headers: {
                        'Accept': '*/*',
                        'X-Requested-With': 'XMLHttpRequest',
                        'Referer': 'https://akrfytv.online/'
                    },
                    credentials: 'include' // কুকি পাঠানোর জন্য
                });
                
                const data = await response.json();
                return data.url;
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

        // ভিডিও প্লে করার ফাংশন
        async function playStream() {
            const video = document.getElementById('video');
            const errorDiv = document.getElementById('error');
            
            // সরাসরি URL (ফলব্যাক)
            const directUrl = 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-4/0/master_2000.m3u8';
            
            // API থেকে URL আনার চেষ্টা
            let streamUrl = await getStreamUrl();
            if (!streamUrl) {
                streamUrl = directUrl;
                console.log('ফলব্যাক URL ব্যবহার করা হচ্ছে');
            }
            
            console.log('স্ট্রিম URL:', streamUrl);
            
            // HLS.js সেটআপ
            if (Hls.isSupported()) {
                const hls = new Hls({
                    debug: false,
                    xhrSetup: function(xhr, url) {
                        // Referer হেডার সেট করা - এটাই মূল চাবিকাঠি!
                        xhr.setRequestHeader('Referer', 'https://akrfytv.online/');
                        xhr.setRequestHeader('Origin', 'https://akrfytv.online');
                    }
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log('M3U8 লোড সফল!');
                    video.play().catch(e => console.log('অটোপ্লে ব্লক:', e));
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    console.error('HLS Error:', data.type, data.details);
                    if (data.fatal) {
                        errorDiv.style.display = 'block';
                    }
                });
            }
            // Native HLS support (iOS/Safari)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play().catch(e => console.log('অটোপ্লে ব্লক:', e));
                });
            }
            else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '⚠️ আপনার ব্রাউজার HLS সাপোর্ট করে না। Chrome/Firefox ব্যবহার করুন।';
            }
        }
        
        // স্ট্রিম শুরু
        playStream();
    </script>
</body>
</html>
