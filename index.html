<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO TVS - FIFA 2026 Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }
        #video {
            width: 100%;
            height: auto;
            background: #111;
            border-radius: 5px;
        }
        .info {
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
        }
        .error {
            color: #ff4444;
            text-align: center;
            padding: 20px;
            display: none;
            font-size: 18px;
        }
        .loading {
            color: #ffcc00;
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="video" controls autoplay playsinline></video>
        <div class="info">⚽ FIFA 2026 - Live Stream</div>
        <div class="loading" id="loading">⏳ ভিডিও লোড হচ্ছে...</div>
        <div class="error" id="error">⚠️ ভিডিও চালানো যাচ্ছে না। স্ট্রিম চেক করুন।</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // সরাসরি M3U8 URL - কোনো akrfytv.online ছাড়াই
        const streamUrl = 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-4/0/master_2000.m3u8';
        
        const video = document.getElementById('video');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        
        function hideLoading() {
            loadingDiv.style.display = 'none';
        }
        
        function showError() {
            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'block';
        }
        
        // HLS.js প্লেয়ার
        if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: false
            });
            
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log('✅ M3U8 লোড সফল!');
                hideLoading();
                video.play().catch(function(e) {
                    console.log('অটোপ্লে ব্লক হয়েছে, বাটনে ক্লিক করুন');
                });
            });
            
            hls.on(Hls.Events.ERROR, function(event, data) {
                console.error('HLS Error:', data.type, data.details);
                if (data.fatal) {
                    showError();
                }
            });
        }
        // Native HLS (iPhone/iPad/Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                hideLoading();
                video.play().catch(function(e) {
                    console.log('অটোপ্লে ব্লক হয়েছে');
                });
            });
        }
        // HLS সাপোর্ট নেই
        else {
            showError();
            errorDiv.textContent = '⚠️ আপনার ব্রাউজার HLS সাপোর্ট করে না। Chrome/Firefox/Safari ব্যবহার করুন।';
        }
    </script>
</body>
</html>
