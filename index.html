<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GO TVS - FIFA 2026 Live</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --primary: #e50914;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --bar-bg: #111111;
            --sidebar-bg: #0d0d0d;
            --sidebar-width: 280px;
            --ads-width: 300px;
            --video-width: 1300px;
            --video-height: 730px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ==================== SIDEBAR (LEFT) ==================== */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-right: 1px solid #222;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-head {
            padding: 16px;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            background: var(--sidebar-bg);
            z-index: 5;
        }

        .sidebar-head h3 {
            color: var(--text);
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-close {
            display: none;
            position: absolute;
            right: 12px;
            top: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 8px 12px;
            gap: 8px;
            border: 1px solid #333;
        }

        .s-icon { font-size: 14px; }

        .search-wrap input {
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .search-wrap input::placeholder { color: #666; }

        .cat-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }

        .cat-tab {
            background: #1a1a1a;
            color: #aaa;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .cat-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .cat-tab:hover { background: #333; color: #fff; }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .channel-list::-webkit-scrollbar { width: 4px; }
        .channel-list::-webkit-scrollbar-track { background: #111; }
        .channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .ch-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            position: relative;
        }

        .ch-item:hover { background: #1a1a1a; }

        .ch-item.active {
            background: #1a0a0a;
            border: 1px solid var(--primary);
        }

        .ch-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 3px;
            background: var(--primary);
            border-radius: 0 3px 3px 0;
        }

        .ch-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            background: #222;
            flex-shrink: 0;
        }

        .ch-info {
            flex: 1;
            min-width: 0;
        }

        .ch-name {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ch-cat { color: #666; font-size: 11px; }

        .ch-num {
            color: #555;
            font-size: 11px;
            font-weight: 600;
            min-width: 24px;
            text-align: right;
        }

        .no-results {
            color: #666;
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
            display: none;
        }

        /* ==================== MAIN AREA (CENTER) ==================== */
        .main-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow-y: auto;
            min-width: 0;
        }

        .player-area {
            width: var(--video-width);
            min-width: var(--video-width);
            max-width: var(--video-width);
            flex-shrink: 0;
        }

        .player-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .player-wrap {
            position: relative;
            width: 100%;
            height: var(--video-height);
            background: #000;
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Center Play */
        .center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(229, 9, 20, 0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s;
            opacity: 1;
        }

        .center-play.hide {
            opacity: 0;
            pointer-events: none;
        }

        .center-play svg {
            width: 36px;
            height: 36px;
            color: #fff;
            margin-left: 4px;
        }

        /* Loader */
        .loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            cursor: pointer;
        }

        .loader.hide { display: none; }

        .loader > div { text-align: center; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-title {
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .loader-sub {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Player Bar */
        .player-bar {
            background: var(--bar-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid #222;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .bar-live {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--primary);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .bar-status-text {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .bar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .quality-select {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .action-btn {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .action-btn:hover { background: #333; }
        .action-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Error Box */
        .error-box {
            background: #1a0000;
            color: #ff4444;
            padding: 14px 18px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
            border: 1px solid #330000;
        }

        .error-box.show { display: block; }

        /* ==================== ADS AREA (RIGHT) ==================== */
        .ads-area {
            width: var(--ads-width);
            min-width: var(--ads-width);
            background: #0d0d0d;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 10px;
            gap: 20px;
            border-left: 1px solid #222;
            overflow-y: auto;
        }

        .ads-title {
            color: #666;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .ad-slot {
            width: 100%;
            max-width: 250px;
            aspect-ratio: 1 / 1;
            background: #111;
            border: 1px dashed #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 14px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .ad-slot:hover {
            border-color: #555;
            color: #666;
        }

        .ad-slot.rectangle {
            aspect-ratio: 300 / 250;
        }

        .ad-slot.vertical {
            aspect-ratio: 160 / 600;
        }

        /* Sidebar Toggle (Mobile) */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 200;
            background: var(--primary);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
        }

        /* Sidebar Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
        }

        .sidebar-overlay.show { display: block; }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 1600px) {
            :root {
                --video-width: 900px;
                --video-height: 506px;
                --ads-width: 250px;
            }
            .ad-slot { max-width: 200px; }
        }

        @media (max-width: 1200px) {
            :root {
                --video-width: 700px;
                --video-height: 394px;
                --ads-width: 200px;
                --sidebar-width: 250px;
            }
            .ad-slot { max-width: 150px; }
            .ad-slot.vertical { display: none; }
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                transform: translateX(-100%);
            }

            .sidebar.open { transform: translateX(0); }
            .sidebar-close { display: block; }
            .sidebar-toggle { display: flex; align-items: center; justify-content: center; }

            .ads-area {
                display: none;
            }

            .main-area {
                padding: 50px 10px 10px 10px;
            }

            :root {
                --video-width: 100%;
                --video-height: auto;
            }

            .player-area {
                width: 100%;
                min-width: 100%;
                max-width: 100%;
            }

            .player-wrap {
                height: auto;
                padding-top: 56.25%;
            }
        }
    </style>
</head>

                { id: "12405", slug: "doraemon-tv", name: "Doraemon TV", cat: "Cartoon", url: "", logo: "https://imglink.cc/cdn/rmNeL8f6NR.png" },
                { id: "12451", slug: "adventure-earth", name: "Adventure Earth", cat: "Documentary", url: "", logo: "https://imglink.cc/cdn/eEZmseF3Tb.jpg" },
                { id: "12452", slug: "bbc-earth", name: "BBC Earth", cat: "Documentary", url: "", logo: "https://imglink.cc/cdn/eEZmseF3Tb.jpg" }
            ];

            // ==================== DOM ELEMENTS ====================
            const video = document.getElementById('videoPlayer');
            const centerPlay = document.getElementById('centerPlay');
            const playerLoader = document.getElementById('playerLoader');
            const loaderSub = document.getElementById('loaderSub');
            const barStatusText = document.getElementById('barStatusText');
            const playBtn = document.getElementById('playBtn');
            const muteBtn = document.getElementById('muteBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const errorBox = document.getElementById('errorBox');
            const qualitySelect = document.getElementById('qualitySelect');
            const playerWrap = document.getElementById('playerWrap');
            const channelList = document.getElementById('channelList');
            const searchInput = document.getElementById('searchInput');
            const catTabs = document.getElementById('catTabs');
            const sidebar = document.getElementById('channelSidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            let hls = null;
            let currentChannelId = 'srv-football-1';
            let currentCat = 'FIFA World Cup';
            let currentStreamUrl = channels[0].url;
            let currentServerName = 'Server 1';

            // No results element
            const noResults = document.createElement('div');
            noResults.className = 'no-results';
            noResults.textContent = 'কোনো চ্যানেল পাওয়া যায়নি';
            channelList.appendChild(noResults);

            // ==================== RENDER CHANNELS ====================
            function renderChannels(filterCat, searchQuery) {
                channelList.querySelectorAll('.ch-item').forEach(el => el.remove());
                noResults.style.display = 'none';

                let filtered = channels;
                if (filterCat && filterCat !== 'all') {
                    filtered = filtered.filter(ch => ch.cat === filterCat);
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(ch => ch.name.toLowerCase().includes(q) || ch.cat.toLowerCase().includes(q));
                }

                if (filtered.length === 0) {
                    noResults.style.display = 'block';
                    document.querySelector('.sidebar-head h3').textContent = '📡 চ্যানেল (0)';
                    return;
                }

                filtered.forEach((ch, index) => {
                    const div = document.createElement('div');
                    div.className = 'ch-item';
                    if (ch.id === currentChannelId) div.classList.add('active');
                    div.setAttribute('role', 'button');
                    div.setAttribute('tabindex', '0');
                    div.dataset.id = ch.id;
                    div.dataset.name = ch.name;
                    div.dataset.cat = ch.cat;
                    div.dataset.url = ch.url;

                    const logoSrc = ch.logo || 'https://placehold.co/48x48/111827/6b7280?text=TV';
                    
                    div.innerHTML = `
                        <img src="${logoSrc}" alt="${ch.name}" class="ch-logo" 
                             loading="lazy" decoding="async" 
                             onerror="this.onerror=null;this.src='https://placehold.co/48x48/111827/6b7280?text=TV'" 
                             draggable="false">
                        <div class="ch-info">
                            <div class="ch-name">${ch.name}</div>
                            <div class="ch-cat">${ch.cat}</div>
                        </div>
                        <span class="ch-num">${String(index + 1).padStart(2, '0')}</span>
                    `;

                    div.addEventListener('click', function() {
                        selectChannel(ch);
                    });

                    channelList.insertBefore(div, noResults);
                });

                document.querySelector('.sidebar-head h3').textContent = `📡 চ্যানেল (${filtered.length})`;
            }

            function selectChannel(ch) {
                currentChannelId = ch.id;
                currentServerName = ch.name;
                
                document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.querySelector(`.ch-item[data-id="${ch.id}"]`);
                if (activeEl) activeEl.classList.add('active');

                if (ch.url) {
                    currentStreamUrl = ch.url;
                    barStatusText.textContent = `FIFA 2026 • ${ch.name}`;
                    loaderSub.textContent = ch.name;
                    setupHls(ch.url);
                } else {
                    showError(`${ch.name} - স্ট্রিম URL নেই`);
                }

                if (window.innerWidth <= 900) closeSidebar();
            }

            // ==================== SIDEBAR LOGIC ====================
            function openSidebar() {
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('show');
            }

            function closeSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            }

            sidebarToggle.addEventListener('click', openSidebar);
            sidebarCloseBtn.addEventListener('click', closeSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);

            searchInput.addEventListener('input', function() {
                renderChannels(currentCat, this.value);
            });

            catTabs.addEventListener('click', function(e) {
                if (e.target.classList.contains('cat-tab')) {
                    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCat = e.target.dataset.cat;
                    searchInput.value = '';
                    renderChannels(currentCat, '');
                }
            });

            // ==================== HLS SETUP ====================
            function setupHls(url) {
                if (!url) { showError('কোনো স্ট্রিম URL নেই'); return; }
                if (hls) { hls.destroy(); hls = null; }

                hideError();
                showLoader('সংযোগ করা হচ্ছে...');
                currentStreamUrl = url;

                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => { hideLoader(); qualitySelect.disabled = true; });
                    video.addEventListener('error', () => showError('ভিডিও লোড করা যাচ্ছে না।'));
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({ debug: false, enableWorker: true, lowLatencyMode: false, backBufferLength: 90 });
                    hls.loadSource(url);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
                        hideLoader();
                        qualitySelect.innerHTML = '<option value="auto">Auto</option>';
                        if (data.levels && data.levels.length > 0) {
                            data.levels.forEach((level, i) => {
                                qualitySelect.innerHTML += `<option value="${i}">${level.height ? level.height+'p' : 'Lv'+(i+1)}</option>`;
                            });
                            qualitySelect.disabled = false;
                        }
                        qualitySelect.onchange = function() {
                            hls.currentLevel = this.value === 'auto' ? -1 : parseInt(this.value);
                        };
                        video.play().catch(() => centerPlay.classList.remove('hide'));
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { showError('নেটওয়ার্ক সমস্যা...'); hls.startLoad(); }
                            else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { showError('মিডিয়া এরর...'); hls.recoverMediaError(); }
                            else { showError('স্ট্রিম লোড হয়নি। অন্য সার্ভার চেষ্টা করুন।'); hls.destroy(); }
                        }
                    });
                } else {
                    showError('ব্রাউজার HLS সাপোর্ট করে না।');
                }
            }

            // ==================== HELPERS ====================
            function hideLoader() { playerLoader.classList.add('hide'); centerPlay.classList.add('hide'); }
            function showLoader(msg) { playerLoader.classList.remove('hide'); if (msg) loaderSub.textContent = msg; }
            function hideError() { errorBox.classList.remove('show'); }
            function showError(msg) { errorBox.textContent = msg || 'স্ট্রিম লোড হয়নি।'; errorBox.classList.add('show'); playerLoader.classList.add('hide'); }
            function updatePlayBtn() { playBtn.textContent = video.paused ? '▶' : '⏸'; }
            function updateMuteBtn() { muteBtn.textContent = video.muted ? '🔇' : '🔊'; }

            // ==================== EVENT LISTENERS ====================
            centerPlay.addEventListener('click', () => { video.play().then(() => { centerPlay.classList.add('hide'); updatePlayBtn(); }).catch(() => {}); });
            playerLoader.addEventListener('click', () => { if (video.paused) video.play().catch(() => {}); if (hls && hls.state === Hls.States.ERROR) setupHls(currentStreamUrl); });
            playBtn.addEventListener('click', () => { if (video.paused) video.play().then(() => centerPlay.classList.add('hide')).catch(() => {}); else { video.pause(); centerPlay.classList.remove('hide'); } updatePlayBtn(); });
            muteBtn.addEventListener('click', () => { video.muted = !video.muted; updateMuteBtn(); });
            fullscreenBtn.addEventListener('click', () => { if (playerWrap.requestFullscreen) playerWrap.requestFullscreen(); else if (playerWrap.webkitRequestFullscreen) playerWrap.webkitRequestFullscreen(); });
            refreshBtn.addEventListener('click', () => setupHls(currentStreamUrl));
            video.addEventListener('play', () => { centerPlay.classList.add('hide'); updatePlayBtn(); });
            video.addEventListener('pause', updatePlayBtn);
            video.addEventListener('volumechange', updateMuteBtn);
            video.addEventListener('waiting', () => { if (!video.paused) showLoader('বাফারিং...'); });
            video.addEventListener('playing', () => { hideLoader(); hideError(); });

            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT') return;
                switch(e.key.toLowerCase()) {
                    case ' ': e.preventDefault(); playBtn.click(); break;
                    case 'f': e.preventDefault(); fullscreenBtn.click(); break;
                    case 'm': e.preventDefault(); muteBtn.click(); break;
                    case 'r': if (!e.ctrlKey) { e.preventDefault(); refreshBtn.click(); } break;
                }
            });

            // ==================== INIT ====================
            renderChannels('FIFA World Cup', '');
            setupHls(currentStreamUrl);
            updateMuteBtn();
            updatePlayBtn();
            console.log('🚀 GO TVS Ready | Video: 1300x730px | Server 1 ✅ | Server 2 ✅');
        })();
    </script>
</body>
</html>
